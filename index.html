<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--navy:#1A2744;--coral:#FF6B47;--sky:#4DB8E8;--cream:#FFF8F0;--sand:#F5EDD8;--text:#1A2744;--text-soft:#5A6A8A;--white:#fff}

  body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--text);line-height:1.6;overflow-x:hidden}

  @keyframes waveDrift{from{transform:translateX(0)}to{transform:translateX(-84px)}}
  .hero-badge{display:inline-block;background:rgba(77,184,232,.18);border:1px solid rgba(77,184,232,.4);color:var(--sky);font-size:.7rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;padding:.35rem 1rem;border-radius:99px;margin-bottom:1.5rem}

  .scroll-hint{position:absolute;bottom:140px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.3rem;color:rgba(255,255,255,.3);font-size:.7rem;letter-spacing:.1em;animation:bounce 2s ease-in-out infinite}

  .section{padding:3rem 1.25rem 1rem;max-width:680px;margin:0 auto}

  .tl-card{background:var(--white);border-radius:14px;padding:.9rem 1.1rem;box-shadow:0 2px 12px rgba(26,39,68,.07);border:1px solid rgba(26,39,68,.06)}
  .tl-item.highlight .tl-card{background:linear-gradient(135deg,#FFF5F2 0%,#FFF8F0 100%);border-color:rgba(255,107,71,.2)}
  .tl-card-header{display:flex;align-items:center;gap:.6rem;margin-bottom:.35rem}

<body>
<div id="app"></div>
<script>
const TAG_LABEL = { food:"Ẩm thực", activity:"Vui chơi", rest:"Nghỉ ngơi", travel:"Di chuyển", special:"✨ Highlight" };

function render() {
  const { hero, footer, notes, days } = TRIP;

  const navHTML = days.map(d =>
    `<a class="day-tab" href="#${d.id}">${d.navLabel}</a>`
  ).join('') + `<a class="day-tab" href="#notes">Lưu ý</a>`;

  const daysHTML = days.map(d => {
    const itemsHTML = d.items.map(item => `
      <div class="tl-item ${item.highlight ? 'highlight' : ''} fade-in">
        <div class="tl-time">${item.time}</div>
        <div class="tl-card">
          <div class="tl-card-header">
            <span class="tl-emoji">${item.emoji}</span>
            <span class="tl-name">${item.name}</span>
          </div>
          <div class="tl-desc">${item.desc}</div>
          <span class="tl-tag tag-${item.tag}">${TAG_LABEL[item.tag] || item.tag}</span>
        </div>
      </div>`).join('');
    return `
      <div id="${d.id}" class="day-section">
        <div class="section">
          <div class="day-header fade-in">
            <div class="day-num">${d.num}</div>
            <div class="day-info">
              <div class="day-label">${d.label}</div>
              <div class="day-title">${d.title}</div>
              <div class="day-date">${d.date}</div>
            </div>
          </div>
          <div class="timeline">${itemsHTML}</div>
        </div>
      </div>`;
  }).join('');

  const notesHTML = notes.map(n => `
    <div class="note-card fade-in">
      <div class="note-card-title">${n.icon} ${n.title}</div>
      <div class="note-card-body">${n.body}</div>
    </div>`).join('');

  const chipsHTML = hero.chips.map(c =>
    `<div class="hero-chip"><span>${c.icon}</span> ${c.text}</div>`).join('');

  document.getElementById('app').innerHTML = `
    <section class="hero">
      <div class="waves-bg"></div>
      <div class="hero-badge">${hero.badge}</div>
      <h1 class="hero-title">${hero.title}<br><span>${hero.subtitle}</span></h1>
      <p class="hero-sub">${hero.tagline}</p>
      <div class="hero-meta">${chipsHTML}</div>
      <div class="scroll-hint"><span>▼</span><span>Lịch trình</span></div>
    </section>
    <nav class="days-nav">${navHTML}</nav>
    ${daysHTML}
    <div id="notes" class="notes-section">
      <div class="notes-inner">
        <div class="notes-title fade-in">📌 Lưu ý quan trọng</div>
        <div class="notes-grid">${notesHTML}</div>
      </div>
    </div>
    <footer class="footer">${hero.badge}<br><span>♥</span> ${footer}</footer>`;

  const obs = new IntersectionObserver(entries => {
    entries.forEach((e,i) => {
      if (e.isIntersecting) { setTimeout(() => e.target.classList.add('visible'), i*55); obs.unobserve(e.target); }
    });
  }, { threshold:0.08, rootMargin:'0px 0px -20px 0px' });
  document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));

  const tabs = document.querySelectorAll('.day-tab');
  const navObs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        tabs.forEach(t => t.classList.remove('active'));
        const t = document.querySelector(`.day-tab[href="#${e.target.id}"]`);
        if (t) t.classList.add('active');
      }
    });
  }, { threshold:0.25 });
  [...days.map(d=>d.id),'notes'].forEach(id => { const el=document.getElementById(id); if(el) navObs.observe(el); });
}

render();
</script>
</body>
</html>
