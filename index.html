<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-light:#E8D5A3;--gold-pale:#F9F4E8;
  --navy:#1B3A52;--text:#2C2C2C;--text-soft:#7A7A7A;--white:#fff;
  --line:rgba(201,168,76,0.28);
}
html{scroll-behavior:smooth}
body{font-family:'Montserrat',sans-serif;background:var(--white);color:var(--text);overflow-x:hidden;line-height:1.7}

/* HERO */
.hero{position:relative;height:100svh;min-height:580px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden}
.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.15) 0%,rgba(0,0,0,.52) 65%,rgba(0,0,0,.72) 100%)}
.hero-content{position:relative;z-index:2;padding:0 1.5rem;display:flex;flex-direction:column;align-items:center;gap:1.2rem}
.hero-eyebrow{font-size:.65rem;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--gold-light);opacity:.9}
.hero-tagline{font-family:'Dancing Script',cursive;font-size:clamp(3rem,11vw,5.5rem);color:var(--white);line-height:1.1;text-shadow:0 2px 24px rgba(0,0,0,.3)}
.hero-divider{width:48px;height:1px;background:var(--gold);opacity:.8}
.hero-sub{font-family:'Cormorant Garamond',serif;font-size:clamp(1rem,3.5vw,1.35rem);font-weight:300;font-style:italic;color:rgba(255,255,255,.85)}
.hero-chips{display:flex;flex-wrap:wrap;gap:.7rem;justify-content:center;margin-top:.4rem}
.hero-chip{font-size:.72rem;font-weight:500;color:rgba(255,255,255,.88);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:2px;padding:.45rem .9rem;backdrop-filter:blur(4px)}
.scroll-cue{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.4rem;z-index:2;animation:floatDown 2.2s ease-in-out infinite}
.scroll-cue span{display:block;width:1px;height:42px;background:linear-gradient(to bottom,rgba(201,168,76,0),var(--gold))}
.scroll-cue p{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4)}
@keyframes floatDown{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(7px)}}

/* NAV */
.sticky-nav{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--line);overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-inner{display:flex;min-width:max-content;padding:0 .5rem}
.nav-tab{padding:.85rem .9rem;font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-soft);text-decoration:none;border-bottom:2px solid transparent;transition:all .25s;white-space:nowrap}
.nav-tab:hover,.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* COMMON */
.pg{max-width:680px;margin:0 auto;padding:0 1.25rem}
.sec-eyebrow{font-size:.6rem;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:.35rem}
.sec-title{font-family:'Dancing Script',cursive;font-size:2.2rem;color:var(--navy);line-height:1.15;margin-bottom:.8rem}
.sec-rule{width:36px;height:1px;background:var(--gold);margin-bottom:1.8rem}

/* DAY BLOCKS */
.day-block{padding:3.5rem 0 1rem}
.day-block+.day-block{border-top:1px solid var(--line)}
.day-meta{display:flex;align-items:flex-start;gap:1.5rem;margin-bottom:1.8rem}
.day-num-wrap{display:flex;flex-direction:column;align-items:center;gap:.3rem;min-width:48px}
.day-num{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:300;color:var(--gold-light);line-height:1}
.day-num-line{width:1px;height:32px;background:var(--line)}
.day-eyebrow{font-size:.75rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.25rem}
.day-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:400;color:var(--navy);line-height:1.25;white-space:pre-line}
.day-date{font-size:.72rem;color:var(--text-soft);margin-top:.25rem;font-style:italic}
.day-img{width:100%;height:160px;object-fit:cover;border-radius:3px;margin-bottom:1.8rem;display:block;filter:brightness(.92) saturate(1.05)}
.day-img-err{background:linear-gradient(135deg,var(--navy),#2d6a9f)}

/* TIMELINE */
.timeline{position:relative;padding-left:1.25rem}
.timeline::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:1px;background:linear-gradient(to bottom,var(--gold),var(--gold-light),rgba(201,168,76,.15))}
.tl-item{position:relative;padding-left:1.2rem;margin-bottom:1.4rem}
.tl-item::before{content:'';position:absolute;left:-1.3rem;top:.5rem;width:7px;height:7px;border-radius:50%;background:var(--white);border:1.5px solid var(--gold-light)}
.tl-item.hi::before{background:var(--gold);border-color:var(--gold);width:9px;height:9px;left:-1.41rem;top:.4rem;box-shadow:0 0 0 3px rgba(201,168,76,.18)}
.tl-time{font-size:.9rem;font-weight:600;letter-spacing:.12em;color:var(--gold);margin-bottom:.18rem}
.tl-card{padding:.8rem 1rem;border:1px solid #F0EBE0;border-radius:2px;background:var(--white)}
.tl-item.hi .tl-card{background:var(--gold-pale);border-color:rgba(201,168,76,.3)}
.tl-head{display:flex;align-items:center;gap:.55rem;margin-bottom:.22rem}
.tl-emoji{font-size:1.05rem;line-height:1}
.tl-name{font-family:'Cormorant Garamond',serif;font-size:1.02rem;font-weight:600;color:var(--navy)}
.tl-desc{font-size:.76rem;color:var(--text-soft);line-height:1.6}
.tl-tag{display:inline-block;font-size:.56rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:.16rem .5rem;border-radius:1px;margin-top:.45rem}
.tag-food    {background:#FDF5E8;color:#9A7020}
.tag-activity{background:#EEF6F9;color:#1B5A72}
.tag-rest    {background:#F1F7EE;color:#3D7035}
.tag-travel  {background:#F3F0FA;color:#5040A0}
.tag-special {background:linear-gradient(135deg,#FDF5E8,#F9EDCF);color:var(--gold);border:1px solid rgba(201,168,76,.3)}

/* EXPERIENCE */
.exp-section{padding:3.5rem 0 2rem;background:var(--white)}
.exp-list{display:flex;flex-direction:column;gap:0}
.exp-item{display:flex;gap:1rem;padding:1.1rem 0;border-bottom:1px solid #F5F0E8;align-items:flex-start}
.exp-item:last-child{border-bottom:none}
.exp-thumb{width:80px;height:64px;min-width:80px;object-fit:cover;border-radius:3px;filter:brightness(.93) saturate(1.05)}
.exp-name{font-family:'Cormorant Garamond',serif;font-size:1.02rem;font-weight:600;color:var(--navy);line-height:1.2}
.exp-sub{font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin:.12rem 0 .28rem}
.exp-desc{font-size:.74rem;color:var(--text-soft);line-height:1.58}

/* AMENITY */
.amenity-section{background:var(--gold-pale);padding:3rem 1.25rem 2.5rem}
.amenity-inner{max-width:680px;margin:0 auto}
.amenity-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.7rem;margin-top:1.6rem}
@media(max-width:400px){.amenity-grid{grid-template-columns:repeat(2,1fr)}}
.amenity-item{display:flex;flex-direction:column;align-items:center;gap:.35rem;background:var(--white);border-radius:2px;padding:.85rem .4rem;border:1px solid var(--line)}
.amenity-icon{font-size:1.3rem}
.amenity-name{font-size:.62rem;font-weight:600;color:var(--navy);text-align:center;line-height:1.3}

/* TICKET */
.ticket-section{padding:3.5rem 0 2rem}
.ticket-block{margin-bottom:2.8rem}
.ticket-header{margin-bottom:1rem;padding-bottom:.8rem;border-bottom:1px solid var(--line)}
.ticket-place{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--navy)}
.ticket-sub{font-size:.68rem;color:var(--gold);margin-top:.2rem;font-weight:500}
.ticket-table{width:100%;border-collapse:collapse;font-size:.72rem}
.ticket-table th{background:var(--navy);color:rgba(255,255,255,.85);font-weight:600;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;padding:.55rem .65rem;text-align:left}
.ticket-table td{padding:.5rem .65rem;border-bottom:1px solid #F0EBE0;color:var(--text)}
.ticket-table tr:last-child td{border-bottom:none}
.ticket-table tr:nth-child(even) td{background:#FDFAF4}
.ticket-table td:first-child{font-weight:500;color:var(--navy)}
.ticket-table td.price{font-weight:700;color:#8a5c10}
.ticket-highlight td{background:#FFF8EC!important}
.ticket-highlight td.price{color:#C9A84C;font-size:.8rem}
.ticket-note{font-size:.67rem;color:var(--text-soft);margin-top:.7rem;font-style:italic;padding-left:.6rem;border-left:2px solid var(--gold-light);line-height:1.55}

/* NOTES */
.notes-wrap{background:var(--navy);padding:3.5rem 1.25rem 3rem}
.notes-inner{max-width:680px;margin:0 auto}
.notes-heading{font-family:'Dancing Script',cursive;font-size:2.1rem;color:var(--gold-light);margin-bottom:.3rem}
.notes-sublabel{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:1.8rem;font-weight:500}
.notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,255,255,.07)}
@media(max-width:460px){.notes-grid{grid-template-columns:1fr}}
.note-item{background:var(--navy);padding:1.2rem 1rem}
.note-icon{font-size:1.15rem;margin-bottom:.35rem}
.note-title{font-family:'Cormorant Garamond',serif;font-size:.98rem;font-weight:600;color:var(--gold-light);margin-bottom:.28rem}
.note-body{font-size:.76rem;color:rgba(255,255,255,.52);line-height:1.6}

/* FOOTER */
.site-footer{background:#101E2A;padding:2.5rem 1rem;text-align:center}
.footer-script{font-family:'Dancing Script',cursive;font-size:1.75rem;color:var(--gold);display:block;margin-bottom:.4rem}
.footer-body{font-size:.7rem;color:rgba(255,255,255,.28);letter-spacing:.06em}

/* REVEAL */
.reveal{opacity:0;transform:translateY(18px);transition:opacity .5s ease,transform .5s ease}
.reveal.on{opacity:1;transform:none}
@media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}.scroll-cue{animation:none}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const TAG={food:"Ẩm thực",activity:"Vui chơi",rest:"Nghỉ ngơi",travel:"Di chuyển",special:"✦ Highlight"};

function build(){
  const {hero,footer,days,experiences,amenities,tickets,notes}=TRIP;

  /* NAV */
  const nav=days.map(d=>`<a class="nav-tab" href="#${d.id}">${d.navLabel}</a>`).join('')
    +`<a class="nav-tab" href="#hanh-trinh">Trải nghiệm</a>`
    +`<a class="nav-tab" href="#bang-gia">Bảng giá vé</a>`
    +`<a class="nav-tab" href="#notes">Lưu ý</a>`;

  /* DAYS */
  const daysHtml=days.map(d=>{
    const items=d.items.map(it=>`
      <div class="tl-item ${it.highlight?'hi':''} reveal">
        <div class="tl-time">${it.time}</div>
        <div class="tl-card">
          <div class="tl-head"><span class="tl-emoji">${it.emoji}</span><span class="tl-name">${it.name}</span></div>
          <div class="tl-desc">${it.desc}</div>
          <span class="tl-tag tag-${it.tag}">${TAG[it.tag]||it.tag}</span>
        </div>
      </div>`).join('');
    return`
      <div id="${d.id}" class="day-block">
        <div class="pg">
          <div class="day-meta reveal">
            <div class="day-num-wrap"><div class="day-num">${d.num}</div><div class="day-num-line"></div></div>
            <div><div class="day-eyebrow">${d.label}</div><div class="day-title">${d.title}</div><div class="day-date">${d.date}</div></div>
          </div>
          <img class="day-img reveal" src="${d.img}" alt="${d.label}" loading="lazy" onerror="this.style.background='linear-gradient(135deg,#1B3A52,#2d6a9f)';this.style.minHeight='160px'">
          <div class="timeline">${items}</div>
        </div>
      </div>`;
  }).join('');

  /* EXPERIENCES */
  const expHtml=experiences.map(e=>`
    <div class="exp-item reveal">
      <img class="exp-thumb" src="${e.img}" alt="${e.name}" loading="lazy">
      <div>
        <div class="exp-name">${e.name}</div>
        <div class="exp-sub">${e.sub}</div>
        <div class="exp-desc">${e.desc}</div>
      </div>
    </div>`).join('');

  /* AMENITIES */
  const amenHtml=amenities.map(a=>`
    <div class="amenity-item reveal"><div class="amenity-icon">${a.icon}</div><div class="amenity-name">${a.name}</div></div>`).join('');

  /* TICKETS */
  const tickHtml=tickets.map(tk=>{
    const thead=`<tr>${tk.cols.map(c=>`<th>${c}</th>`).join('')}</tr>`;
    const tbody=tk.rows.map((r,i)=>{
      // highlight combo 3 khu row
      const hl=r[0].toLowerCase().includes('combo')?'ticket-highlight':'';
      return`<tr class="${hl}">${r.map((cell,ci)=>`<td${ci>0?' class="price"':''}>${cell}</td>`).join('')}</tr>`;
    }).join('');
    return`
      <div class="ticket-block reveal">
        <div class="ticket-header">
          <div class="ticket-place">${tk.place}</div>
          <div class="ticket-sub">${tk.sub}</div>
        </div>
        <table class="ticket-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table>
        <div class="ticket-note">${tk.note}</div>
      </div>`;
  }).join('');

  /* NOTES */
  const notesHtml=notes.map(n=>`
    <div class="note-item reveal"><div class="note-icon">${n.icon}</div><div class="note-title">${n.title}</div><div class="note-body">${n.body}</div></div>`).join('');

  /* CHIPS */
  const chips=hero.chips.map(c=>`<div class="hero-chip">${c.icon} ${c.text}</div>`).join('');

  document.getElementById('root').innerHTML=`
    <section class="hero">
      <img class="hero-img" src="${hero.heroImg}" alt="Biển" loading="eager">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="hero-eyebrow">Hải Phòng · Tháng 7 · 2026</div>
        <div class="hero-tagline">${hero.tagline}</div>
        <div class="hero-divider"></div>
        <div class="hero-sub">${hero.subtitle}</div>
        <div class="hero-chips">${chips}</div>
      </div>
      <div class="scroll-cue"><p>Khám phá</p><span></span></div>
    </section>

    <nav class="sticky-nav"><div class="nav-inner">${nav}</div></nav>

    ${daysHtml}

    <section id="hanh-trinh" class="exp-section">
      <div class="pg">
        <div class="sec-eyebrow reveal">Hành trình</div>
        <div class="sec-title reveal">Trải Nghiệm</div>
        <div class="sec-rule reveal"></div>
        <div class="exp-list">${expHtml}</div>
      </div>
    </section>

    <section class="amenity-section">
      <div class="amenity-inner">
        <div class="sec-eyebrow reveal">Vinhomes Royal Island</div>
        <div class="sec-title reveal">Tiện Ích Villa</div>
        <div class="sec-rule reveal"></div>
        <div class="amenity-grid">${amenHtml}</div>
      </div>
    </section>

    <section id="bang-gia" class="ticket-section">
      <div class="pg">
        <div class="sec-eyebrow reveal">Thông tin vé</div>
        <div class="sec-title reveal">Bảng Giá Vé</div>
        <div class="sec-rule reveal"></div>
        ${tickHtml}
      </div>
    </section>

    <div id="notes" class="notes-wrap">
      <div class="notes-inner">
        <div class="notes-heading reveal">Lưu ý quan trọng</div>
        <div class="notes-sublabel reveal">Những điều cần nhớ</div>
        <div class="notes-grid">${notesHtml}</div>
      </div>
    </div>

    <footer class="site-footer">
      <span class="footer-script">${hero.tagline}</span>
      <div class="footer-body">${footer}</div>
    </footer>`;

  /* REVEAL */
  const io=new IntersectionObserver(entries=>{
    entries.forEach((e,i)=>{if(e.isIntersecting){setTimeout(()=>e.target.classList.add('on'),i*45);io.unobserve(e.target);}});
  },{threshold:.06,rootMargin:'0px 0px -16px 0px'});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));

  /* ACTIVE NAV */
  const tabs=document.querySelectorAll('.nav-tab');
  const ids=[...days.map(d=>d.id),'hanh-trinh','bang-gia','notes'];
  const nio=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        tabs.forEach(t=>t.classList.remove('active'));
        const t=document.querySelector(`.nav-tab[href="#${e.target.id}"]`);
        if(t)t.classList.add('active');
      }
    });
  },{threshold:.2});
  ids.forEach(id=>{const el=document.getElementById(id);if(el)nio.observe(el);});
}

build();
</script>
</body>
</html>
